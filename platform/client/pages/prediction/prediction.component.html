<section class="bg-navy-950 py-6 lg:py-8 pb-10 lg:pb-12">
  <div class="max-w-6xl mx-auto px-4 lg:px-6">

    @if (error) {
      <div class="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 text-red-300 text-sm mb-4">
        ⚠️ {{ error }}
      </div>
    }

    @if (loadingTeams) {
      <div class="bg-navy-800 rounded-2xl p-12 flex items-center justify-center gap-3 border border-white/[0.06]">
        <app-spinner />
        <span class="text-white/50 text-sm">Loading teams...</span>
      </div>
    } @else {

      <app-model-config (configChanged)="onConfigChanged($event)" />

      <!-- Main card -->
      <div class="bg-navy-800 rounded-2xl border border-white/[0.07] overflow-hidden shadow-2xl shadow-black/50">

        <!-- Match banner -->
        <div class="bg-gradient-to-br from-[#0A1E3D] to-[#0F2B57] px-4 lg:px-6 py-4 lg:py-5 border-b border-amber-500/15">
          <div class="flex items-center gap-4 lg:gap-6">

            <!-- Home -->
            <div class="flex-1 flex items-center gap-3">
              <div class="w-10 h-10 lg:w-14 lg:h-14 bg-white/[0.06] rounded-full flex items-center justify-center border border-white/10 shrink-0 overflow-hidden">
                <span class="text-lg lg:text-2xl opacity-50">🏠</span>
              </div>
              <div>
                <p class="text-[0.6rem] lg:text-[0.65rem] uppercase tracking-widest text-white/35 font-semibold m-0 mb-0.5">Home</p>
                <p class="text-[0.65rem] lg:text-[0.7rem] text-emerald-400/80 m-0">{{ homePlayers.length }}/11</p>
              </div>
            </div>

            <!-- VS -->
            <div class="text-center shrink-0">
              <div class="bg-amber-500/10 border border-amber-500/20 rounded-lg px-3 lg:px-4 py-1.5 lg:py-2">
                <p class="font-bold text-amber-400 text-sm lg:text-base m-0 tracking-widest">VS</p>
              </div>
            </div>

            <!-- Away -->
            <div class="flex-1 flex items-center flex-row-reverse gap-3 text-right">
              <div class="w-10 h-10 lg:w-14 lg:h-14 bg-white/[0.06] rounded-full flex items-center justify-center border border-white/10 shrink-0 overflow-hidden">
                <span class="text-lg lg:text-2xl opacity-50">✈️</span>
              </div>
              <div>
                <p class="text-[0.6rem] lg:text-[0.65rem] uppercase tracking-widest text-white/35 font-semibold m-0 mb-0.5">Away</p>
                <p class="text-[0.65rem] lg:text-[0.7rem] text-blue-400/80 m-0">{{ awayPlayers.length }}/11</p>
              </div>
            </div>

          </div>
        </div>

        <!-- Body — stacks on mobile: home → away → center -->
        <div class="flex flex-col lg:flex-row">
          <app-team-panel
            class="order-1 lg:order-1"
            side="home"
            [teams]="teams"
            [selectedTeamId]="homeTeamId"
            [selectedPlayers]="homePlayers"
            [teamPlayers]="homeTeamPlayers"
            [loadingPlayers]="loadingHomePlayers"
            (teamSelected)="selectTeam('home', $event)"
            (playerAdded)="addPlayer('home', $event)"
            (playerRemoved)="removePlayer('home', $event)"
          />

          <app-match-center
            class="order-3 lg:order-2"
            [homeCount]="homePlayers.length"
            [awayCount]="awayPlayers.length"
            [loading]="loading"
            [selectedModel]="modelConfig.model"
            (predict)="predict()"
            (clearHome)="homePlayers = []; result = null"
            (clearAway)="awayPlayers = []; result = null"
          />

          <app-team-panel
            class="order-2 lg:order-3"
            side="away"
            [teams]="teams"
            [selectedTeamId]="awayTeamId"
            [selectedPlayers]="awayPlayers"
            [teamPlayers]="awayTeamPlayers"
            [loadingPlayers]="loadingAwayPlayers"
            (teamSelected)="selectTeam('away', $event)"
            (playerAdded)="addPlayer('away', $event)"
            (playerRemoved)="removePlayer('away', $event)"
          />
        </div>

      </div>

      @if (result) {
        <app-result-card
          [result]="result"
          [homeTeamName]="teamName('home')"
          [homeTeamLogo]="teamLogo('home')"
          [awayTeamName]="teamName('away')"
          [awayTeamLogo]="teamLogo('away')"
          [selectedModel]="modelConfig.model"
        />
      }

    }
  </div>
</section>

<app-how-it-works />
