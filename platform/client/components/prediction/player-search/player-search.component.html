<div class="relative">
  <input
    type="text"
    [(ngModel)]="search"
    (focus)="dropdownOpen = true"
    (blur)="dropdownOpen = false"
    placeholder="🔍 Search player..."
    [disabled]="disabled"
    class="w-full px-3 py-2 text-sm bg-navy-700 border border-white/[0.12] rounded-md text-slate-100 outline-none disabled:opacity-50 disabled:cursor-not-allowed"
  />

  @if (dropdownOpen && filtered.length) {
    <ul class="absolute z-50 top-[calc(100%+4px)] left-0 right-0 bg-navy-850 border border-white/[0.12] rounded-xl shadow-2xl max-h-52 overflow-y-auto list-none p-1 m-0">
      @for (player of filtered; track player.id) {
        <li
          (mousedown)="select(player)"
          class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg cursor-pointer transition-colors duration-100"
          [class]="dropdownItemHover">
          <img
            [src]="player.photo"
            class="w-7 h-7 rounded-full object-cover bg-navy-600 shrink-0 border border-white/10"
            (error)="$any($event.target).style.visibility='hidden'"
          />
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm text-slate-100 truncate m-0">{{ player.name }}</p>
            <p class="text-xs text-white/40 m-0">{{ player.position }}</p>
          </div>
          <span
            class="text-[0.62rem] px-1.5 py-0.5 rounded font-bold shrink-0 border"
            [class]="side === 'home'
              ? 'bg-emerald-500/15 text-emerald-400 border-emerald-500/20'
              : 'bg-blue-500/15 text-blue-400 border-blue-500/20'">
            {{ player.position.charAt(0) }}
          </span>
        </li>
      }
    </ul>
  }
</div>
